<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Preview: Glitch Background</title>
    <style>
        :root { --bg: #0a0a0f; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #fff;
            color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Effets de Glitch en arrière-plan */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(138, 79, 255, 0.02);
            z-index: 1;
            animation: bg-glitch 8s infinite;
            pointer-events: none;
        }

        @keyframes bg-glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-5px, 5px); background: rgba(0, 242, 255, 0.05); }
            2% { transform: translate(0); }
            45% { transform: translate(0); }
            46% { transform: translate(5px, -5px); background: rgba(255, 0, 193, 0.05); }
            47% { transform: translate(0); }
        }

        .auth-container { text-align: center; z-index: 2; position: relative; }
        .game-title {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 0.15em;
        }
        
        .glitch {
            position: relative;
            color: #000;
            mix-blend-mode: multiply;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; /* Pour que le glitch soit visible sur le fond blanc */
        }

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #ff00c1;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
            animation: glitch-anim2 1s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
            100% { clip: rect(67px, 9999px, 62px, 0); transform: skew(0.1deg); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(65px, 9999px, 100px, 0); transform: skew(0.15deg); }
            100% { clip: rect(10px, 9999px, 50px, 0); transform: skew(0.3deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="game-title glitch" data-text="BLACKOUT">BLACKOUT</h1>
        <p>Infiltrez. Propagez. Dominez.</p>
    </div>
</body>
</html>
