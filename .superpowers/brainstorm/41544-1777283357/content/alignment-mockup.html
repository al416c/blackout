<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UX Alignment - Thinline HUD</title>
    <style>
        body { margin: 0; background: #010206; color: #fff; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .screen { display: flex; flex-direction: column; height: 100vh; }
        
        /* Proposed HUD: Thin and focused */
        .hud-thin {
            height: 40px;
            background: rgba(10, 15, 25, 0.9);
            border-bottom: 1px solid rgba(0, 242, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 12px;
        }

        .detection-bar {
            display: flex;
            gap: 2px;
            height: 20px;
            width: 400px;
            border: 1px solid rgba(138, 79, 255, 0.5);
            padding: 2px;
        }
        .segment { flex: 1; background: rgba(138, 79, 255, 0.1); }
        .segment.active { background: #8a4fff; box-shadow: 0 0 10px #8a4fff; }

        .canvas-area { flex: 1; position: relative; background: radial-gradient(circle, #0a0b1e 0%, #010206 100%); }
        .city-grid { position: absolute; inset: 0; opacity: 0.1; background-image: linear-gradient(#00f2ff 1px, transparent 1px), linear-gradient(90deg, #00f2ff 1px, transparent 1px); background-size: 50px 50px; }

        .terminal {
            height: 35vh;
            background: rgba(5, 6, 10, 0.95);
            border-top: 2px solid #00f2ff;
            display: flex;
            flex-direction: column;
        }
        .terminal-header {
            padding: 5px 15px;
            background: rgba(0, 242, 255, 0.1);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #00f2ff;
        }
        .terminal-content { flex: 1; padding: 10px; font-size: 13px; color: #00ff99; }
        .terminal-input { display: flex; padding: 5px 10px; border-top: 1px solid rgba(0, 242, 255, 0.1); }
        .prompt { color: #00f2ff; margin-right: 10px; }

        .stat-value { color: #fff; font-weight: bold; }
        .accent { color: #00f2ff; }
    </style>
</head>
<body>
    <div class="screen">
        <div class="hud-thin">
            <div><span class="accent">SYS:</span> <span class="stat-value">CONNECTED</span></div>
            <div class="detection-bar">
                <div class="segment active"></div><div class="segment active"></div><div class="segment active"></div>
                <div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div>
                <div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div><div class="segment"></div>
            </div>
            <div><span class="accent">CYCLES:</span> <span class="stat-value">1,402</span></div>
        </div>
        <div class="canvas-area">
            <div class="city-grid"></div>
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
                <div style="width: 10px; height: 10px; background: #8a4fff; transform: rotate(45deg); box-shadow: 0 0 20px #8a4fff; margin: auto;"></div>
                <div style="margin-top: 10px; font-size: 10px; color: rgba(0, 242, 255, 0.5);">NODE_0xAF4</div>
            </div>
        </div>
        <div class="terminal">
            <div class="terminal-header">
                <span>TERMINAL_BLACKOUT v2.1</span>
                <span>TAB: COMPLETE | CPU: 1402 | SCORE: 850</span>
            </div>
            <div class="terminal-content">
                root@blackout:~# modules<br>
                [01] SMB_EXPLOIT         50 CPU<br>
                [02] POLYMORPHIC_ENGINE 150 CPU<br>
                root@blackout:~# install 01<br>
                [PROG] Injection : [████░░░░░░] 40%
            </div>
            <div class="terminal-input">
                <span class="prompt">></span>
                <span>install p_</span>
            </div>
        </div>
    </div>
</body>
</html>
