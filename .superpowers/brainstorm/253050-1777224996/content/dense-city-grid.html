<style>
  :root {
    --bg-void: #06070a;
    --building-base: #0f111a;
    --building-highlight: #161925;
    --nebula-purple: #8a4fff;
    --ui-cyan: #00f2ff;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  body {
    background-color: var(--bg-void);
    color: #cbd5e0;
    font-family: 'Inter', sans-serif;
    margin: 0;
    overflow: hidden;

    /* Ville dense vue de dessus - plein de petits quadrilatères */
    background-image: 
      /* "Windows/Lights" on some buildings */
      radial-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
      /* Small buildings pattern */
      linear-gradient(90deg, var(--bg-void) 2px, transparent 2px),
      linear-gradient(var(--bg-void) 2px, transparent 2px),
      linear-gradient(var(--building-base), var(--building-base));
    background-size: 40px 40px, 15px 15px, 15px 15px, 100% 100%;
    background-position: 5px 5px, 0 0, 0 0, 0 0;
  }

  /* Overlay pour varier la taille des bâtiments de façon aléatoire (statique) */
  body::before {
    content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
      linear-gradient(90deg, var(--bg-void) 5px, transparent 5px),
      linear-gradient(var(--bg-void) 5px, transparent 5px);
    background-size: 35px 55px; /* Tailles différentes pour briser la monotonie */
    opacity: 0.5;
    z-index: -1;
  }

  .game-container {
    display: grid;
    grid-template-rows: 90px 1fr 220px;
    height: 100vh;
  }

  /* HUD - Barre du haut */
  .hud-full {
    background: rgba(10, 12, 18, 0.98);
    border-bottom: 1px solid rgba(0, 242, 255, 0.2);
    display: grid;
    grid-template-columns: 250px 1fr 250px;
    align-items: center;
    padding: 0 40px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 10;
  }

  /* NOUVELLE BARRE DE DÉTECTION - Plus massive et "bloc" */
  .detection-monitor {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 40px;
  }
  .detection-label {
    font-size: 10px;
    color: var(--nebula-purple);
    text-transform: uppercase;
    letter-spacing: 3px;
    font-weight: bold;
    margin-bottom: 6px;
  }
  .detection-bar-container {
    width: 100%;
    max-width: 500px;
    height: 24px; /* Plus épaisse */
    background: #000;
    border: 1px solid rgba(138, 79, 255, 0.3);
    position: relative;
    padding: 3px; /* Padding interne pour l'effet de cadre */
    box-sizing: border-box;
  }
  .detection-segments {
    display: flex;
    gap: 3px;
    height: 100%;
    width: 100%;
  }
  .segment {
    flex: 1;
    background: rgba(138, 79, 255, 0.1);
    height: 100%;
  }
  .segment.active {
    background: var(--nebula-purple);
    box-shadow: 0 0 10px var(--nebula-purple);
  }
  .detection-value {
    position: absolute;
    right: -50px;
    top: 50%;
    transform: translateY(-50%);
    font-family: var(--font-mono);
    color: var(--nebula-purple);
    font-weight: bold;
  }

  .stat-group { display: flex; flex-direction: column; }
  .stat-label { font-size: 9px; color: var(--ui-cyan); text-transform: uppercase; letter-spacing: 2px; }
  .stat-value { font-size: 1.5rem; font-family: var(--font-mono); color: #fff; }

  /* Nodes */
  .node {
    position: absolute;
    width: 16px; height: 16px;
    background: var(--nebula-purple);
    border: 2px solid #fff;
    box-shadow: 0 0 20px var(--nebula-purple);
    z-index: 5;
    transform: rotate(45deg);
  }
  .node.uninfected {
    background: #222;
    border: 1px solid #444;
    width: 10px; height: 10px;
    box-shadow: none;
    transform: none;
    opacity: 0.6;
  }

  /* Terminal */
  .terminal-box {
    background: #050608;
    border-top: 2px solid var(--ui-cyan);
    padding: 20px 40px;
    font-family: var(--font-mono);
  }
  .prompt { color: var(--ui-cyan); }

</style>

<div class="game-container">
  <!-- HUD -->
  <div class="hud-full">
    <div class="stat-group">
      <span class="stat-label">Vector Status</span>
      <span class="stat-value">CONNECTED</span>
    </div>

    <div class="detection-monitor">
      <span class="detection-label">BlueTeam Detection Risk</span>
      <div class="detection-bar-container">
        <div class="detection-segments">
          <div class="segment active"></div>
          <div class="segment active"></div>
          <div class="segment active"></div>
          <div class="segment active"></div>
          <div class="segment active"></div>
          <div class="segment active"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
          <div class="segment"></div>
        </div>
        <span class="detection-value">40%</span>
      </div>
    </div>

    <div class="stat-group" style="align-items: flex-end;">
      <span class="stat-label">CPU Cycle Energy</span>
      <span class="stat-value" style="color:var(--ui-cyan);">12,400</span>
    </div>
  </div>

  <div style="position:relative; flex:1; overflow:hidden;">
    <!-- Dense City Background is managed by Body CSS -->
    
    <!-- Large key infrastructure -->
    <div style="position:absolute; top:20%; left:25%; width:40px; height:40px; background:var(--building-highlight); border:1px solid rgba(255,255,255,0.1);"></div>
    <div style="position:absolute; top:60%; left:55%; width:60px; height:30px; background:var(--building-highlight); border:1px solid rgba(255,255,255,0.1);"></div>

    <!-- Nodes -->
    <div class="node" style="top: 22%; left: 27%;"></div>
    <div class="node" style="top: 55%; left: 45%;"></div>
    <div class="node uninfected" style="top: 35%; left: 65%;"></div>
    <div class="node uninfected" style="top: 75%; left: 20%;"></div>

    <svg style="position:absolute; width:100%; height:100%; pointer-events:none;">
      <line x1="27%" y1="22%" x2="45%" y2="55%" style="stroke:var(--nebula-purple); stroke-width:2; opacity: 0.3;" />
    </svg>
  </div>

  <div class="terminal-box">
    <div style="color: #666; font-size: 11px; margin-bottom: 10px;">SYSTEM_LOG // BOOT_SEQUENCE_COMPLETE</div>
    <div style="color:#fff;"><span class="prompt">></span> install ghost_protocol --target=subnet_01<span style="display:inline-block; width:8px; height:18px; background:var(--ui-cyan); margin-left: 5px;"></span></div>
  </div>
</div>
