<style>
  :root {
    --cyber-black: #050508;
    --cyber-pink: #ff0055;
    --cyber-green: #00ff99;
    --cyber-blue: #00d2ff;
    --glass: rgba(15, 15, 25, 0.7);
    --glow-pink: 0 0 15px rgba(255, 0, 85, 0.5);
  }

  body {
    background-color: var(--cyber-black);
    color: #eee;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
  }

  /* Scanline effect */
  .scanline {
    width: 100%; height: 100%;
    position: fixed; top: 0; left: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    background-size: 100% 2px, 3px 100%;
    pointer-events: none;
    z-index: 100;
  }

  .game-container {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 10px;
    gap: 10px;
  }

  /* Cyber HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    background: var(--glass);
    border: 1px solid var(--cyber-pink);
    box-shadow: var(--glow-pink);
    border-radius: 4px;
    clip-path: polygon(0 0, 95% 0, 100% 30%, 100% 100%, 5% 100%, 0 70%);
  }

  .stat-box {
    text-align: center;
  }
  .stat-label { font-size: 10px; color: var(--cyber-pink); text-transform: uppercase; letter-spacing: 2px; }
  .stat-value { font-size: 1.5rem; color: #fff; text-shadow: 0 0 10px var(--cyber-pink); }

  /* Map Simulation */
  .map-area {
    border: 1px solid rgba(0, 210, 255, 0.3);
    background: radial-gradient(circle at 50% 50%, #0a0c1a 0%, #050508 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cyber-node {
    width: 20px; height: 20px;
    background: var(--cyber-green);
    border-radius: 2px;
    box-shadow: 0 0 15px var(--cyber-green);
    position: absolute;
  }

  .cyber-node.infected {
    background: var(--cyber-pink);
    box-shadow: 0 0 20px var(--cyber-pink);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.2); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Cyber Terminal */
  .terminal {
    height: 200px;
    background: rgba(0, 0, 0, 0.9);
    border-top: 2px solid var(--cyber-blue);
    padding: 15px;
    font-size: 14px;
    color: var(--cyber-blue);
    position: relative;
  }

  .terminal::after {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 210, 255, 0.03);
    pointer-events: none;
  }

  .tag {
    background: var(--cyber-pink);
    color: white;
    padding: 2px 5px;
    font-size: 10px;
    margin-right: 10px;
  }

</style>

<div class="scanline"></div>

<div class="game-container">
  <div class="hud">
    <div class="stat-box">
      <div class="stat-label">System Load</div>
      <div class="stat-value">WORM v2.1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Suspicion Level</div>
      <div style="width: 200px; height: 10px; background: #222; margin-top: 10px; border: 1px solid var(--cyber-pink);">
        <div style="width: 45%; height: 100%; background: var(--cyber-pink); box-shadow: 0 0 10px var(--cyber-pink);"></div>
      </div>
      <div style="color: var(--cyber-pink); font-size: 12px; text-align: right;">45.2%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">CPU Cycles</div>
      <div class="stat-value" style="color: var(--cyber-green); text-shadow: 0 0 10px var(--cyber-green);">1,450</div>
    </div>
  </div>

  <div class="map-area">
    <div style="position: absolute; color: rgba(0,210,255,0.1); font-size: 5rem; font-weight: bold; pointer-events: none;">NETWORK MAP</div>
    <!-- Simulated nodes -->
    <div class="cyber-node infected" style="top: 30%; left: 40%;"></div>
    <div class="cyber-node infected" style="top: 45%; left: 35%;"></div>
    <div class="cyber-node" style="top: 20%; left: 60%;"></div>
    <div class="cyber-node" style="top: 60%; left: 55%;"></div>
    <div class="cyber-node" style="top: 40%; left: 70%;"></div>
    
    <svg style="position:absolute; width:100%; height:100%; pointer-events:none;">
      <line x1="40%" y1="30%" x2="35%" y2="45%" style="stroke:var(--cyber-pink);stroke-width:1;opacity:0.5" />
      <line x1="40%" y1="30%" x2="60%" y2="20%" style="stroke:rgba(0,210,255,0.2);stroke-width:1;" />
    </svg>
  </div>

  <div class="terminal">
    <div><span class="tag">SUCCESS</span> Module 'exploit.smb' injected into Node #14</div>
    <div><span class="tag" style="background:var(--cyber-blue)">INFO</span> Packet capture initialized on eth0...</div>
    <div><span class="tag" style="background:var(--cyber-green)">STATUS</span> CPU Generation increased to +12/tick</div>
    <br>
    <div>root@blackout:~# <span style="animation: blink 1s infinite;">_</span></div>
  </div>
</div>

<style>
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
